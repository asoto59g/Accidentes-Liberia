<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Accidentes Viales - Liberia</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Sistema de monitoreo y análisis de accidentes viales en Liberia, Guanacaste. Datos históricos 2020-2024.">
    <meta name="author" content="ABC Geomática Agrícola">
    
    <!-- Social Media / Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Accidentes Viales - Liberia | ABC Geomática">
    <meta property="og:description" content="Análisis geoespacial de siniestralidad vial en Liberia (2020-2024). Fuente: SNIT/COSEVI.">
    <meta property="og:image" content="./preview.jpg">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Accidentes Viales - Liberia">
    <meta name="twitter:description" content="Análisis de accidentes viales en Liberia, Guanacaste. Visualización interactiva 2020-2024.">
    <meta name="twitter:image" content="./preview.jpg">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-body: #0f172a;
            --panel-bg: rgba(15, 23, 42, 0.78);
            --panel-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --info: #0ea5e9;
            
            --glass-blur: 16px;
            --card-radius: 20px;
            --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);

            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        #map {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: calc(var(--safe-top) + 16px);
            left: calc(var(--safe-left) + 16px);
            width: min(400px, calc(100vw - var(--safe-left) - var(--safe-right) - 32px));
            height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 32px);
            max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 32px);
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: var(--card-radius);
            border: 1px solid var(--panel-border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.32s ease, opacity 0.25s ease;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            will-change: transform;
        }

        .sidebar.collapsed {
            transform: translateX(calc(-100% - 20px));
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-header {
            padding: 30px 26px 22px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.03), transparent);
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            flex-shrink: 0;
        }

        .brand h1 {
            font-size: 1.32rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 6px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            min-height: 80px;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at top right, rgba(255,255,255,0.05), transparent);
        }

        .stat-val {
            font-size: 1.65rem;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
            line-height: 1;
        }

        .stat-lab {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 26px 18px;
            flex-shrink: 0;
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .btn-tab {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-smooth);
        }

        .btn-tab.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .section-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .legend-container {
            padding: 0 26px 18px;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--panel-border);
            flex-shrink: 0;
        }

        .legend-items {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            transition: var(--transition-smooth);
        }

        .legend-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--panel-border);
        }

        .legend-item input {
            cursor: pointer;
            accent-color: var(--accent-primary);
        }

  .brand-footer {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px 8px calc(5px + var(--safe-bottom));
    min-height: auto;
    gap: 2px;
}

.brand-footer img {
    max-width: 60px;
    height: auto;
    margin: 0;
}

.brand-footer p {
    font-size: 0.52rem;
    line-height: 1;
    margin: 0;
}

        .sev-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .sev-alta { background: var(--danger); }
        .sev-media { background: var(--warning); }
        .sev-baja { background: var(--success); }

        .map-controls {
            position: fixed;
            top: calc(var(--safe-top) + 16px);
            right: calc(var(--safe-right) + 16px);
            z-index: 120;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-btn {
            width: 44px;
            height: 44px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: var(--transition-smooth);
            user-select: none;
        }

        .map-btn:hover {
            background: var(--accent-primary);
            transform: translateX(-4px);
        }

        #toggleSidebar {
            position: fixed;
            top: calc(var(--safe-top) + 16px);
            left: calc(var(--safe-left) + 16px);
            z-index: 200;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15,23,42,0.82);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            font-size: 18px;
            font-weight: 700;
        }

        .leaflet-popup-content-wrapper {
            background: var(--panel-bg) !important;
            backdrop-filter: blur(8px);
            color: white !important;
            border-radius: 16px !important;
            border: 1px solid var(--panel-border);
        }

        .leaflet-popup-tip {
            background: var(--panel-bg) !important;
        }

        /* Tablets / Android */
        @media (max-width: 768px) {
            .sidebar {
                top: calc(var(--safe-top) + 10px);
                left: calc(var(--safe-left) + 10px);
                width: min(340px, calc(100vw - var(--safe-left) - var(--safe-right) - 20px));
                height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 20px);
                max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 20px);
                border-radius: 18px;
            }

            .sidebar.collapsed {
                transform: translateX(calc(-100% - 14px));
            }

            #toggleSidebar {
                top: calc(var(--safe-top) + 10px);
                left: calc(var(--safe-left) + 10px);
                width: 42px;
                height: 42px;
            }

            .map-controls {
                top: calc(var(--safe-top) + 10px);
                right: calc(var(--safe-right) + 10px);
                gap: 8px;
            }

            .map-btn {
                width: 42px;
                height: 42px;
            }

            .sidebar-header {
                padding: 24px 20px 18px;
            }

            .filter-tabs {
                padding: 0 20px 16px;
                gap: 7px;
            }

            .legend-container {
                padding: 0 20px 16px;
            }

            .brand h1 {
                font-size: 1.18rem;
            }

            .stat-card {
                padding: 13px;
                min-height: 72px;
            }

            .stat-val {
                font-size: 1.42rem;
            }

            .btn-tab {
                padding: 7px 12px;
                font-size: 0.76rem;
            }

            .brand-footer {
                padding: 24px 16px calc(20px + var(--safe-bottom));
                min-height: 120px;
            }

            .brand-footer img {
                max-width: 95px;
            }
        }

        /* Android pequeños */
        @media (max-width: 480px) {
            .sidebar {
                top: calc(var(--safe-top) + 8px);
                left: calc(var(--safe-left) + 8px);
                width: min(300px, calc(100vw - var(--safe-left) - var(--safe-right) - 16px));
                height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 16px);
                max-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 16px);
                border-radius: 16px;
            }

            .sidebar.collapsed {
                transform: translateX(calc(-100% - 12px));
            }

            #toggleSidebar {
                top: calc(var(--safe-top) + 8px);
                left: calc(var(--safe-left) + 8px);
                width: 40px;
                height: 40px;
                border-radius: 11px;
            }

            .map-controls {
                top: calc(var(--safe-top) + 8px);
                right: calc(var(--safe-right) + 8px);
            }

            .map-btn {
                width: 40px;
                height: 40px;
                border-radius: 11px;
            }

            .sidebar-header {
                padding: 20px 16px 14px;
            }

            .brand {
                gap: 10px;
                margin-bottom: 14px;
            }

            .brand-logo {
                width: 36px;
                height: 36px;
                border-radius: 10px;
            }

            .brand h1 {
                font-size: 1.05rem;
            }

            .stats-row {
                gap: 10px;
            }

            .stat-card {
                padding: 11px;
                border-radius: 14px;
                min-height: 68px;
            }

            .stat-val {
                font-size: 1.22rem;
            }

            .stat-lab {
                font-size: 0.64rem;
            }

            .filter-tabs {
                padding: 0 16px 14px;
                gap: 6px;
            }

            .btn-tab {
                padding: 6px 10px;
                font-size: 0.72rem;
            }

            .legend-container {
                padding: 0 16px 14px;
            }

            .legend-items {
                gap: 8px;
            }

            .legend-item {
                font-size: 0.74rem;
                padding: 5px 8px;
            }

            .section-title {
                font-size: 0.75rem;
                margin-bottom: 10px;
            }

            .brand-footer {
                padding: 18px 12px calc(16px + var(--safe-bottom));
                min-height: 100px;
            }

            .brand-footer img {
                max-width: 84px;
                margin-bottom: 8px;
            }

            .brand-footer p {
                font-size: 0.58rem;
            }
        }

        @media (max-width: 390px) {
            .sidebar {
                width: min(285px, calc(100vw - var(--safe-left) - var(--safe-right) - 14px));
            }

            .brand h1 {
                font-size: 0.98rem;
            }

            .btn-tab {
                font-size: 0.68rem;
            }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="toggleSidebar" aria-label="Mostrar panel" aria-expanded="false">☰</button>

    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-logo">
                    <i data-lucide="shield-alert" style="color: white; width: 22px;"></i>
                </div>
                <div>
                    <h1>Accidentes Viales</h1>
                    <p style="font-size: 0.75rem; color: var(--text-muted)">Liberia, Guanacaste</p>
                </div>
            </div>

            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-val" id="total-val">0</span>
                    <span class="stat-lab">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-val" id="high-val" style="color: var(--danger)">0</span>
                    <span class="stat-lab">Graves</span>
                </div>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="btn-tab" data-filter="cosevi" data-year="2020">2020</button>
            <button class="btn-tab" data-filter="cosevi" data-year="2021">2021</button>
            <button class="btn-tab" data-filter="cosevi" data-year="2022">2022</button>
            <button class="btn-tab" data-filter="cosevi" data-year="2023">2023</button>
            <button class="btn-tab active" data-filter="cosevi" data-year="2024">2024</button>
            <button class="btn-tab" data-filter="cosevi-all">Todo</button>
        </div>

        <div class="legend-container">
            <h2 class="section-title">
                <i data-lucide="layers-2" style="width: 14px;"></i>
                Simbología
            </h2>
            <div class="legend-items">
                <label class="legend-item">
                    <input type="checkbox" checked data-severity="Alta">
                    <span class="sev-dot sev-alta"></span>
                    <span>Severa</span>
                </label>
                <label class="legend-item">
                    <input type="checkbox" checked data-severity="Media">
                    <span class="sev-dot sev-media"></span>
                    <span>Media</span>
                </label>
                <label class="legend-item">
                    <input type="checkbox" checked data-severity="Baja">
                    <span class="sev-dot sev-baja"></span>
                    <span>Baja</span>
                </label>
            </div>
        </div>

        <div class="brand-footer">
            <img src="./abcgeomatica-logo.png" alt="ABC Geomática">
            <p>Fuente: SNIT / COSEVI</p>
        </div>
    </aside>

    <div class="map-controls">
        <div class="map-btn" id="btn-zoom-in" title="Acercar"><i data-lucide="plus"></i></div>
        <div class="map-btn" id="btn-zoom-out" title="Alejar"><i data-lucide="minus"></i></div>
        <div class="map-btn" id="btn-locate" title="Mi Ubicación"><i data-lucide="navigation"></i></div>
        <div class="map-btn" id="btn-layers" title="Cambiar Mapa"><i data-lucide="layers"></i></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Data Sources -->
    <script src="./aoi.js"></script>
    <script src="./liberia_2020.js"></script>
    <script src="./liberia_2021.js"></script>
    <script src="./liberia_2022.js"></script>
    <script src="./liberia_2023.js"></script>
    <script src="./liberia_2024.js"></script>
    
    <script>
        lucide.createIcons();

        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            preferCanvas: true,
            fadeAnimation: false,
            markerZoomAnimation: false
        }).setView([10.635, -85.435], 13);

        const canvasRenderer = L.canvas({ padding: 0.5 });

        const baseLayers = {
            satellite: L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 })
        };
        baseLayers.satellite.addTo(map);

        const TOMTOM_KEY = 'TICK5HMcK7KPIiG5aYzcrUzJrWz9q4fk';
        const BBOX = '-85.468,10.604,-85.405,10.668';

        let activeSeverities = { 'Alta': true, 'Media': true, 'Baja': true };
        let fullDataset = [];
        let currentSource = 'COSEVI 2024';
        let markerLayer = L.layerGroup().addTo(map);
        let severityChart = null;
        let currentBase = 'satellite';
        let sidebarVisible = false;

        const severityStyle = {
            Alta: {
                radius: 7,
                color: '#ffffff',
                weight: 1.2,
                fillColor: '#ef4444',
                fillOpacity: 0.9
            },
            Media: {
                radius: 6,
                color: '#ffffff',
                weight: 1.1,
                fillColor: '#f59e0b',
                fillOpacity: 0.88
            },
            Baja: {
                radius: 5,
                color: '#ffffff',
                weight: 1,
                fillColor: '#10b981',
                fillOpacity: 0.85
            }
        };

        if (typeof AOI_DATA !== 'undefined') {
            const aoi = L.geoJSON(AOI_DATA, {
                style: {
                    color: '#3b82f6',
                    weight: 2,
                    opacity: 0.6,
                    fillOpacity: 0.05,
                    dashArray: '8, 8'
                }
            }).addTo(map);

            map.fitBounds(aoi.getBounds());
        }

        const applyFilters = () => {
            const currentData = fullDataset.filter(d => activeSeverities[d.severity]);
            renderStats(currentData);
            renderMarkers(currentData);
            updateStatus(currentSource);
        };

        const updateUI = (data, sourceName) => {
            fullDataset = data;
            currentSource = sourceName;
            applyFilters();
        };

        const renderStats = (data) => {
            const total = data.length;
            const high = data.filter(a => a.severity === 'Alta').length;

            document.getElementById('total-val').innerText = total;
            document.getElementById('high-val').innerText = high;
        };

        const renderMarkers = (data) => {
            const newLayer = L.layerGroup();

            data.forEach(acc => {
                const style = severityStyle[acc.severity] || severityStyle.Baja;

                const marker = L.circleMarker([acc.lat, acc.lng], {
                    renderer: canvasRenderer,
                    radius: style.radius,
                    color: style.color,
                    weight: style.weight,
                    fillColor: style.fillColor,
                    fillOpacity: style.fillOpacity
                });

                marker.bindPopup(`
                    <div style="padding:4px; min-width: 180px;">
                        <h4 style="margin-bottom:8px; font-size: 0.95rem;">${acc.details}</h4>
                        <p style="font-size:0.8rem; opacity:0.8; margin-bottom:4px;">Fuente: ${acc.source}</p>
                        <p style="font-size:0.8rem; opacity:0.8; margin-bottom:4px;">Severidad: ${acc.severity}</p>
                        <p style="font-size:0.8rem; opacity:0.8;">Fecha: ${acc.date}</p>
                    </div>
                `);

                newLayer.addLayer(marker);
            });

            const oldLayer = markerLayer;
            markerLayer = newLayer.addTo(map);

            if (oldLayer) {
                map.removeLayer(oldLayer);
            }
        };

        const renderAnalytics = (data) => {
            const section = document.getElementById('analytics-section');
            if (!section) return;

            section.style.display = 'block';

            const stats = { alta: 0, media: 0, baja: 0 };
            data.forEach(a => stats[a.severity.toLowerCase()]++);

            if (severityChart) severityChart.destroy();

            const chartEl = document.getElementById('severityChart');
            if (!chartEl) return;

            const ctx = chartEl.getContext('2d');
            severityChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Alta', 'Media', 'Baja'],
                    datasets: [{
                        data: [stats.alta, stats.media, stats.baja],
                        backgroundColor: ['#ef4444', '#f59e0b', '#10b981'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#94a3b8',
                                font: { family: 'Outfit', size: 10 }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });
        };

        const updateStatus = (text) => {
            const badge = document.getElementById('status-badge');
            if (!badge) return;

            badge.innerHTML = `
                <span class="sev-dot" style="background: var(--accent-primary); width: 8px; height: 8px;"></span>
                <span>${text}</span>
            `;
        };

        const formatDate = (date) => {
            if (typeof date === 'string') return date;
            return date.toLocaleDateString('es-CR', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };

        async function getTomTom() {
            try {
                const res = await fetch(`https://api.tomtom.com/traffic/services/4/incidentDetails/s3/${BBOX}/12/-1/json?key=${TOMTOM_KEY}&language=es-ES`);
                const data = await res.json();
                const accidents = [];

                if (data.tmpl?.[0]?.poi) {
                    data.tmpl[0].poi.forEach((poi, i) => {
                        let sev = 'Baja';
                        if (poi.mg === 3) sev = 'Media';
                        if (poi.mg >= 4) sev = 'Alta';

                        accidents.push({
                            id: `tt-${i}`,
                            lat: poi.p.y,
                            lng: poi.p.x,
                            source: 'TomTom',
                            severity: sev,
                            date: formatDate(new Date()),
                            details: poi.d || 'Incidente de tráfico'
                        });
                    });
                }

                updateUI(accidents, 'TomTom Traffic (En Vivo)');
            } catch (e) {
                updateStatus('Error al conectar con TomTom');
            }
        }

        const getCosevi = (year) => {
            const varName = `COSEVI_DATA_${year}`;

            if (window[varName]) {
                const data = window[varName].features.map((f, i) => {
                    const p = f.properties;
                    if (!p.yorig_wgs84 || !p.xorig_wgs84) return null;

                    const sev =
                        (Number(p.muerto_sum) > 0 || Number(p.grave_sum) > 0) ? 'Alta'
                        : (Number(p.leve_sum) > 0) ? 'Media'
                        : 'Baja';

                    return {
                        id: f.id || `cosevi_${year}_${i}`,
                        lat: parseFloat(p.yorig_wgs84),
                        lng: parseFloat(p.xorig_wgs84),
                        source: `COSEVI ${year}`,
                        severity: sev,
                        date: year.toString(),
                        details: `${p.tipoaccidente} (${p.nombredistrito})`
                    };
                }).filter(Boolean);

                updateUI(data, `COSEVI ${year} (Histórico)`);
            }
        };

        const getAllCosevi = () => {
            let all = [];

            [2020, 2021, 2022, 2023, 2024].forEach(y => {
                const varName = `COSEVI_DATA_${y}`;

                if (window[varName]) {
                    const mapped = window[varName].features.map((f, i) => {
                        const p = f.properties;
                        if (!p.yorig_wgs84 || !p.xorig_wgs84) return null;

                        const sev =
                            (Number(p.muerto_sum) > 0 || Number(p.grave_sum) > 0) ? 'Alta'
                            : (Number(p.leve_sum) > 0) ? 'Media'
                            : 'Baja';

                        return {
                            id: f.id || `cosevi_${y}_${i}`,
                            lat: parseFloat(p.yorig_wgs84),
                            lng: parseFloat(p.xorig_wgs84),
                            source: `COSEVI ${y}`,
                            severity: sev,
                            date: y.toString(),
                            details: `${p.tipoaccidente} (${p.nombredistrito})`
                        };
                    }).filter(Boolean);

                    all = all.concat(mapped);
                }
            });

            updateUI(all, 'Consolidado COSEVI 2020-2024');
        };

        document.querySelectorAll('.btn-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const filter = btn.dataset.filter;

                if (filter === 'cosevi') {
                    getCosevi(btn.dataset.year);
                } else if (filter === 'cosevi-all') {
                    getAllCosevi();
                }
            };
        });

        document.querySelectorAll('.legend-item input').forEach(cb => {
            cb.onchange = (e) => {
                activeSeverities[e.target.dataset.severity] = e.target.checked;
                applyFilters();
            };
        });

        document.getElementById('btn-zoom-in').onclick = () => map.zoomIn();
        document.getElementById('btn-zoom-out').onclick = () => map.zoomOut();

        document.getElementById('btn-locate').onclick = () => {
            map.locate({ setView: true, maxZoom: 16 });
        };

        document.getElementById('btn-layers').onclick = () => {
            map.removeLayer(baseLayers[currentBase]);
            currentBase = currentBase === 'satellite' ? 'dark' : 'satellite';
            baseLayers[currentBase].addTo(map);
        };

        const toggleBtn = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');

        const updateToggleButton = () => {
            toggleBtn.textContent = sidebarVisible ? '✕' : '☰';
            toggleBtn.setAttribute('aria-label', sidebarVisible ? 'Ocultar panel' : 'Mostrar panel');
            toggleBtn.setAttribute('aria-expanded', String(sidebarVisible));
        };

        const setSidebarState = (visible, invalidateMap = true) => {
            sidebarVisible = visible;
            sidebar.classList.toggle('collapsed', !visible);
            updateToggleButton();

            if (invalidateMap) {
                setTimeout(() => {
                    map.invalidateSize();
                }, 350);
            }
        };

        toggleBtn.onclick = () => {
            setSidebarState(!sidebarVisible);
        };

        const refreshMapSize = () => {
            setTimeout(() => {
                map.invalidateSize();
            }, 250);
        };

        window.addEventListener('resize', refreshMapSize);
        window.addEventListener('orientationchange', refreshMapSize);

        map.on('locationerror', () => {
            console.warn('No se pudo obtener la ubicación del usuario.');
        });

        setSidebarState(false, false);
        getCosevi('2024');
    </script>
